name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure required assets exist
        run: |
          test -f main.js
          test -f manifest.json

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true

      - name: Attest main.js provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest manifest.json provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: manifest.json

      - name: Attest styles.css provenance
        if: ${{ hashFiles('styles.css') != '' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css
