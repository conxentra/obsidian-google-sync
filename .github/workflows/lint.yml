name: Lint

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"
            - run: npm ci
            - run: npm run build
            - run: npm run lint
            - run: npm run format:check
            # The plugin bundle must stay free of Node/headless code (mobile support).
            - run: node scripts/check-runtime-bundle.mjs
            # Version metadata (manifest/package/versions.json) must stay in lockstep.
            - run: npm run check:release-metadata
              env:
                  ALLOW_EXISTING_RELEASE_TAG: "1"
            # The headless bundle must keep building alongside the plugin.
            - run: npm run build:headless
            - run: bash scripts/smoke-headless.sh
