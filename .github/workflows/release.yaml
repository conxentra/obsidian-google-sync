# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release
# Create a release when a new version tag is created
# You can trigger this like so:
#     npm version patch
#     # push the created commit and tag
#     git push
#     git push origin tag <tag>
# See also: https://docs.obsidian.md/Plugins/Releasing/Release+your+plugin+with+GitHub+Actions
on:
    push:
        tags: ["*.*.*"]

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm

            - name: Verify tag matches manifest version
              run: |
                  MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")
                  if [ "$GITHUB_REF_NAME" != "$MANIFEST_VERSION" ]; then
                      echo "Tag $GITHUB_REF_NAME does not match manifest.json version $MANIFEST_VERSION" >&2
                      exit 1
                  fi

            - name: Build
              run: |
                  npm ci
                  npm run build

            - name: Check release metadata and bundle
              env:
                  ALLOW_EXISTING_RELEASE_TAG: "1"
              run: |
                  npm run check:release-metadata
                  node scripts/check-runtime-bundle.mjs

            - name: Run unit tests
              run: npm run test:unit

            - name: Create GitHub release and upload assets
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      main.js
                      manifest.json
                      styles.css
                  generate_release_notes: true

            - name: Attest main.js provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: main.js

            - name: Attest manifest.json provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: manifest.json

            - name: Attest styles.css provenance
              if: ${{ hashFiles('styles.css') != '' }}
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: styles.css
